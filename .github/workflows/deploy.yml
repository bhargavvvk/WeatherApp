name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci
            - name: Generate Production Environment
        run: |
          cat > src/environments/environment.production.ts <<EOF
          export const environment = {
            production: true,
            apiBaseUrl: '${{ vars.API_BASE_URL }}'
          };
          EOF
      - name: Build Angular Application
        run: npm run build -- --configuration production --base-href /WeatherApp/
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/weather-app/browser
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4